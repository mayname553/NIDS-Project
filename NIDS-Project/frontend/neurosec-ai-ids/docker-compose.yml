version: '3.8'

services:
  frontend:
    build: .
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - neurosec-network

  backend:
    image: neurosec-ai/backend:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=database
      - DB_PORT=5432
      - DB_NAME=neurosec
      - DB_USER=neurosec
      - DB_PASSWORD=${DB_PASSWORD}
    volumes:
      - ./backend-data:/app/data
    depends_on:
      - database
    networks:
      - neurosec-network

  database:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=neurosec
      - POSTGRES_USER=neurosec
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - neurosec-network

volumes:
  postgres-data:

networks:
  neurosec-network:
    driver: bridge