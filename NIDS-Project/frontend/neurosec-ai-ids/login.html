<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroSec-Aegis | 访问控制终端</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="login-body">
    <div class="cyber-grid-bg"></div>
    
    <div class="login-container glass-panel">
        <div class="login-header">
            <div class="logo-hexagon">
                <i class="fas fa-shield-virus cyber-glow"></i>
            </div>
            <h1 class="orbitron-text">NeuroSec<span class="text-accent">-Aegis</span></h1>
            <p class="login-subtitle">零信任态势感知与主动防御中枢 v2.6</p>
            <div class="tech-tags">
                <span>INT8 量化引擎</span>
                <span>TD3 策略网</span>
            </div>
        </div>
        
        <form id="login-form" class="login-form">
            <div class="form-group input-cyber">
                <i class="fas fa-user-astronaut input-icon"></i>
                <input type="text" id="username" placeholder="管理员识别码 (ID)" required autocomplete="username">
            </div>
            
            <div class="form-group input-cyber">
                <i class="fas fa-fingerprint input-icon"></i>
                <input type="password" id="password" placeholder="高权限访问密钥" required autocomplete="current-password">
                <button type="button" class="toggle-password"><i class="fas fa-eye"></i></button>
            </div>
            
            <div class="form-options">
                <label class="cyber-checkbox">
                    <input type="checkbox" id="remember-me">
                    <span class="checkmark"></span>
                    <span class="label-text">保持加密链路</span>
                </label>
            </div>
            
            <button type="submit" class="cyber-btn primary-btn" id="login-button">
                <span class="btn-text">建立安全连接 (ESTABLISH)</span>
                <i class="fas fa-satellite-dish btn-icon"></i>
            </button>
        </form>
        
        <div class="login-footer">
            <p><i class="fas fa-lock"></i> TLS 1.3 军工级加密信道已激活</p>
        </div>
    </div>
</body>
</html>
